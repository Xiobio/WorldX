<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>Walkable Mask 对比 v1 vs v2</title>
  <style>
    :root { color-scheme: dark; --accent: #d9b380; --fg: #f7eed9; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0e0d0c; color: var(--fg);
      font-family: "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
    header {
      position: sticky; top: 0; z-index: 10;
      padding: 16px 24px;
      background: linear-gradient(180deg, rgba(20,18,16,0.98), rgba(20,18,16,0.85));
      border-bottom: 1px solid rgba(217,179,128,0.3);
      backdrop-filter: blur(6px);
    }
    header h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: 6px; color: var(--accent); font-weight: 400; }
    header .sub { font-size: 12px; color: rgba(247,238,217,0.6); letter-spacing: 2px; }
    header .controls { margin-top: 10px; display: flex; gap: 12px; align-items: center; }
    header .controls label { font-size: 12px; color: rgba(247,238,217,0.75); cursor: pointer; }
    header .controls input { vertical-align: middle; }
    .filter-pill {
      padding: 4px 12px;
      border: 1px solid rgba(217,179,128,0.3);
      border-radius: 999px;
      font-size: 11px; letter-spacing: 2px;
      color: rgba(247,238,217,0.75);
      cursor: pointer;
      background: transparent;
      font-family: inherit;
    }
    .filter-pill.on { background: rgba(217,179,128,0.25); color: var(--accent); border-color: var(--accent); }
    main { padding: 24px; max-width: 1600px; margin: 0 auto; }
    .row {
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(217,179,128,0.12);
    }
    .row .meta {
      display: flex; align-items: baseline; gap: 14px; margin-bottom: 12px;
    }
    .row h2 { margin: 0; font-size: 18px; letter-spacing: 4px; color: var(--accent); font-weight: 400; }
    .row .kind { font-size: 10px; letter-spacing: 4px; color: rgba(217,179,128,0.5); text-transform: uppercase; padding: 2px 8px; border: 1px solid rgba(217,179,128,0.3); border-radius: 4px; }
    .row .delta { font-size: 14px; }
    .row .delta.win { color: #9dd99a; }
    .row .delta.flat { color: rgba(247,238,217,0.5); }
    .row .delta.loss { color: #e58c8c; }
    .row .desc { font-size: 11px; color: rgba(247,238,217,0.5); letter-spacing: 1px; margin-left: auto; max-width: 50%; text-align: right; }
    .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .pair > div { position: relative; }
    .pair img { width: 100%; aspect-ratio: 3 / 2; object-fit: cover; display: block; border-radius: 4px; background: #050505; }
    .pair .tag {
      position: absolute; top: 10px; left: 10px;
      padding: 4px 10px; border-radius: 999px;
      background: rgba(20,18,16,0.85);
      font-size: 10px; letter-spacing: 3px;
      border: 1px solid rgba(217,179,128,0.4);
      color: var(--accent);
    }
    .pair .stat {
      position: absolute; bottom: 10px; right: 10px;
      padding: 4px 10px; border-radius: 4px;
      background: rgba(20,18,16,0.85);
      font-size: 11px; color: var(--accent);
      font-family: monospace;
    }
    .summary {
      margin: 32px 0 8px;
      padding: 18px 22px;
      background: rgba(217,179,128,0.06);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
    }
    .summary h3 { margin: 0 0 8px; font-size: 14px; letter-spacing: 4px; color: var(--accent); font-weight: 500; }
    .summary p { margin: 4px 0; font-size: 12px; color: rgba(247,238,217,0.8); line-height: 1.7; }
    @media (max-width: 700px) {
      .pair { grid-template-columns: 1fr; }
      .row .desc { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>艾欧尼亚 · Walkable Mask 对比</h1>
    <div class="sub">v1 = 原 prompt · v2 = 严格保守 prompt · 14 个命名地标</div>
    <div class="controls">
      <button class="filter-pill on" data-filter="all">全部 14</button>
      <button class="filter-pill" data-filter="landmark">仅 ★ 地标</button>
      <button class="filter-pill" data-filter="changed">仅有变化</button>
      <span style="margin-left: auto; font-size: 11px; color: rgba(247,238,217,0.5);">▶ 走廊浏览：滚动即可</span>
    </div>
  </header>
  <main id="root"></main>
  <script type="module">
    const ZONE_ID = "ionia-full_2026-05-06T07-02-24";

    // Pre-computed comparison data, ordered by gameplay flow
    const ROWS = [
      // landmarks
      { id: "R0C2_L07",  name: "巴尔猴王城",  kind: "landmark", v1: 8.0,  v2: 5.1,  note: "去掉树冠/外围误标" },
      { id: "R1C1_L08",  name: "翁玛梦林",    kind: "landmark", v1: 9.3,  v2: 5.8,  note: "梦境森林收紧" },
      { id: "R1C3_L04",  name: "修真寺",      kind: "landmark", v1: 16.0, v2: 11.8, note: "去掉悬崖瀑布误标" },
      { id: "R1C4_L05",  name: "影流秘窟",    kind: "landmark", v1: 21.8, v2: 18.5, note: "温和削减" },
      { id: "R2C2_L01A", name: "纳沃利圣坛",  kind: "landmark", v1: 12.6, v2: 11.6, note: "白石祭坛正确不标" },
      { id: "R3C2_L01B", name: "纳沃利市集",  kind: "landmark", v1: 16.9, v2: 17.3, note: "v1 已经够好，几乎同等" },
      { id: "R3C3_L09",  name: "灵息渡口",    kind: "landmark", v1: 5.3,  v2: 4.8,  note: "池水中央误标清除" },
      { id: "R3C4_L10",  name: "羽族秘巢",    kind: "landmark", v1: 14.2, v2: 11.5, note: "树冠适度收紧" },
      { id: "R4C1_L11",  name: "战痕渔村",    kind: "landmark", v1: 17.4, v2: 10.6, note: "🔥 6+ 个废屋顶误标全清" },
      { id: "R4C2_L01C", name: "断墙广场",    kind: "landmark", v1: 30.5, v2: 24.9, note: "纪念碑底座更精确" },
      { id: "R4C3_L06",  name: "均衡神殿",    kind: "landmark", v1: 12.3, v2: 6.7,  note: "🔥 倒映池水面误标清除" },
      { id: "R5C2_L03",  name: "修桑稻田",    kind: "landmark", v1: 12.7, v2: 8.8,  note: "村屋周围杂乱地面收紧" },
      { id: "R5C5_L02",  name: "加林港",      kind: "landmark", v1: 15.4, v2: 16.6, note: "v1 漏标码头甲板，v2 补全" },
      { id: "R6C2_L12",  name: "流浪戏团",    kind: "landmark", v1: 32.5, v2: 26.4, note: "彩色帐篷顶不再误标" },
    ];

    const root = document.getElementById("root");

    function renderRows(filter) {
      const filtered = ROWS.filter((r) => {
        if (filter === "all") return true;
        if (filter === "landmark") return r.kind === "landmark";
        if (filter === "changed") return Math.abs(r.v1 - r.v2) >= 1;
        return true;
      });
      root.innerHTML = "";
      // Summary at top
      const sum = document.createElement("div");
      sum.className = "summary";
      const wins = filtered.filter((r) => r.v2 < r.v1 - 0.5).length;
      const flats = filtered.filter((r) => Math.abs(r.v1 - r.v2) <= 0.5).length;
      const ups = filtered.filter((r) => r.v2 > r.v1 + 0.5).length;
      sum.innerHTML = `
        <h3>本视图总览（${filtered.length} 个）</h3>
        <p>✅ ${wins} 改善 · ⏸ ${flats} 持平 · ⚠ ${ups} 增加（视情况判断）</p>
        <p>平均 walkable %：v1 ${(filtered.reduce((s,r)=>s+r.v1,0)/filtered.length).toFixed(1)}% → v2 ${(filtered.reduce((s,r)=>s+r.v2,0)/filtered.length).toFixed(1)}%</p>
      `;
      root.appendChild(sum);
      for (const r of filtered) {
        const row = document.createElement("div");
        row.className = "row";
        const delta = r.v2 - r.v1;
        const cls = Math.abs(delta) <= 0.5 ? "flat" : delta < 0 ? "win" : "loss";
        const sym = Math.abs(delta) <= 0.5 ? "≈" : delta < 0 ? "↓" : "↑";
        row.innerHTML = `
          <div class="meta">
            <h2>${r.name}</h2>
            <span class="kind">${r.kind === "landmark" ? "★ Landmark" : "过渡"}</span>
            <span class="delta ${cls}">${sym} ${Math.abs(delta).toFixed(1)} pp</span>
            <span class="desc">${r.note}</span>
          </div>
          <div class="pair">
            <div>
              <span class="tag">v1 原版</span>
              <img loading="lazy" src="/zones/${ZONE_ID}/walkable/${r.id}-marked.png" />
              <span class="stat">${r.v1.toFixed(1)}%</span>
            </div>
            <div>
              <span class="tag">v2 严格版</span>
              <img loading="lazy" src="/zones/${ZONE_ID}/walkable-v2/${r.id}-marked.png" />
              <span class="stat">${r.v2.toFixed(1)}%</span>
            </div>
          </div>
        `;
        root.appendChild(row);
      }
    }

    document.querySelectorAll(".filter-pill").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-pill").forEach((b) => b.classList.remove("on"));
        btn.classList.add("on");
        renderRows(btn.dataset.filter);
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
    renderRows("all");
  </script>
</body>
</html>
